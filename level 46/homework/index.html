<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>რიცხვების მანიპულაცია</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
    }

    .header {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 18px;
      color: #333;
    }

    .container {
      text-align: center;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 48px;
      margin: 20px 0;
    }

    input {
      padding: 10px;
      font-size: 18px;
      width: 200px;
      margin-bottom: 20px;
    }

    .buttons button {
      padding: 10px 20px;
      font-size: 18px;
      margin: 5px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body>
  <div class="header">
    <span id="user-info"></span>
  </div>

  <div class="container">
    <h1 id="number-display">0</h1>

    <input type="number" id="number-input" placeholder="შეიყვანეთ რიცხვი">

    <div class="buttons">
      <button onclick="add()">დამატება</button>
      <button onclick="subtract()">გამოკლება</button>
      <button onclick="multiply()">გამრავლება</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
